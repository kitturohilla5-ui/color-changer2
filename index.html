<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Changer</title>
<style>
body{
font-family:Arial,sans-serif;
text-align:center;
background:#f2f2f2;
transition:0.5s;
padding-top:50px;
}
#box{
width:200px;
height:200px;
margin:20px auto;
background:red;
border-radius:20px;
}
button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:#007bff;
color:white;
cursor:pointer;
}
#code{
margin-top:20px;
font-size:22px;
font-weight:bold;
}
</style>
</head>
<body>

<h1>Color Changer</h1>

<div id="box"></div>

<button onclick="changeColor()">Change Color</button>

<div id="code">#FF0000</div>

<script>
function changeColor(){
let color="#"+Math.floor(Math.random()*16777215).toString(16).padStart(6,"0");
document.body.style.background=color;
document.getElementById("box").style.background=color;
document.getElementById("code").innerHTML=color;
}
</script>

</body>
</html>
